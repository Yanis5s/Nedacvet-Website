{% load static %}
<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nedacvet - Лазерно изрязани пана</title>
  <link rel="stylesheet" href="{% static 'css/galleryGrids.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/footer.css' %}">
</head>
<body>
  <header>
    <div class="logo">
      <a href="{% url 'home' %}">Недацвет</a>
    </div>
    <nav>
      <a href="{% url 'home' %}">начало</a>
      <a href="{% url 'gallery' %}" style="color:#fff;">галерия</a>
      <a href="{% url 'contact' %}">контакти</a>
    </nav>
  </header>

  <div class="gallery-page">
    <!-- Секция с текст/категории -->
    <div class="gallery-text">
       <p><a href="{% url 'panels' %}">ЛАЗЕРНО ИЗРЯЗАНИ ПАНА</a></p>
       <!-- Можеш да добавиш и другите линкове тук -->
    </div>

    <!-- Основната решетка -->
    <div class="gallery-grid">
      <div class="square">
        <img src="{% static 'images/pergula1.jpg' %}" alt="Проект 1">
      </div>
      <div class="square">
        <img src="{% static 'images/pergula2.jpg' %}" alt="Проект 2">
      </div>
      <div class="square">
        <img src="{% static 'images/pergula3.jpg' %}" alt="Проект 3">
      </div>
      <div class="square">
        <img src="{% static 'images/pergolas/pergola1.png' %}" alt="Проект 4">
      </div>
      <div class="square">
        <img src="{% static 'images/pergolas/pergola2.png' %}" alt="Проект 5">
      </div>
      <div class="square">
        <img src="{% static 'images/pergolas/pergola3.png' %}" alt="Проект 6">
      </div>
      <div class="square">
        <img src="{% static 'images/pergolas/pergola4.png' %}" alt="Проект 7">
      </div>
      <div class="square">
        <img src="{% static 'images/pergolas/pergola5.png' %}" alt="Проект 8">
      </div>
      <div class="square">
        <img src="{% static 'images/pergolas/pergola6.png' %}" alt="Проект 8">
      </div>
      

    </div>
  </div>

  <footer>
    <center><span style="color: #fff;">[WORK IN PROGRESS]</span></center>
  </footer>
</body>
</html>
