{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nedacvet - Контакти</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/contactUs.css' %}">
</head>
<body>
  <!-- ✅ Same Header -->
  <header>
    <div class="logo">
      <a href="{% url 'home' %}">Nedacvet</a>
    </div>
    <nav>
      <a href="{% url 'home' %}">начало</a>
      <a href="{% url 'gallery' %}">галерия</a>
      <a href="{% url 'contact' %}" style="color:#fff;">контакти</a>
    </nav>
  </header>

  <!-- ✅ Contact Section -->
  <main class="contact-page">

    <form class="contact-form" method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="name">Име</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Имейл</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="message">Съобщение</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>

      <button type="submit" class="contact-btn">Изпрати</button>
    </form>

    <div class="contact-info">
      <h2>Нашите Контакти</h2>
      <p><strong>Телефон:</strong> +359 888 123 456</p>
      <p><strong>Имейл:</strong> info@nedacvet.bg</p>
      <p><strong>Адрес:</strong> ул. Пример 123, София, България</p>
    </div>
  </main>
</body>
</html>
